# Francis Suite — Tabla de Nomenclaturas
# WebHarvest → Francis Suite

mappings:
  # Core / Config
  config: francis-workflow

  # HTTP
  http: http-call
  http-header: http-header
  http-param: http-param

  # Parsing
  html-to-xml: convert-html-to-xml
  xpath: xpath-extract
  xquery: xquery-script
  xq-expression: xquery-expression
  xq-param: xquery-param
  xslt: xslt-transform
  stylesheet: xslt-stylesheet
  xml: xml-build

  # Regex
  regexp: regex-match
  regexp-pattern: regex-pattern
  regexp-source: regex-source
  regexp-result: regex-result

  # Text / Output
  template: build-text
  text: text-format
  script: run-script

  # File
  file: file  # temporal — se expandirá en versión futura

  # Flow control
  loop: loop
  while: while
  if: if
  else: else
  case: case
  try: try
  catch: catch
  exit: exit
  return: return

  # Functions
  function: function-create
  call: function-call
  call-param: function-param
  include: include

  # Variables / Boxes
  def: box-def
  get: box
  var: box
  set: box-set

  # Misc
  list: list
  empty: empty
  body: execution-body
  body-processor: execution-body
  sleep: sleep
  tokenize: text-split
  value-of: evaluate
  constant: constant
  log: log
  param: param

  # JSON/XML conversion
  json-to-xml: convert-json-to-xml
  xml-to-json: convert-xml-to-json

  # Database
  database: database-call
  db-param: db-param
  db-connection: db-connect
  db-query: db-query

  # FTP
  ftp: ftp-call
  ftp-get: ftp-get
  ftp-put: ftp-put
  ftp-list: ftp-list

  # Mail
  mail: send-mail

  # Zip
  zip: zip
  zip-entry: zip-entry

  # Browser
  web-browser: browser-open
  web-browser-load: browser-load
  web-browser-javascript: browser-run
  web-browser-render: browser-render

notes:
  file: "Temporal. Se expandirá a file-read, file-write, file-download, file-upload, file-manage"
  param: "Temporal. Pendiente confirmar existencia en el sitio"
  new_tags: "Las etiquetas nuevas de Francis Suite (open-claw, use-ia, take-screenshot, etc.) se documentan por separado"